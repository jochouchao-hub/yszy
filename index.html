<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视聚合 JSON 资源</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family: "Microsoft Yahei",monospace;
            background:#111;
            color:#eee;
            padding:20px;
        }
        .container{
            max-width:1000px;
            margin:0 auto;
        }
        h1{
            text-align:center;
            margin-bottom:20px;
            color:#409eff;
        }
        .tip{
            text-align:center;
            color:#aaa;
            margin-bottom:15px;
        }
        .btn-copy{
            width:100%;
            padding:12px;
            background:#409eff;
            border:none;
            color:#fff;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            margin-bottom:15px;
        }
        .json-box{
            background:#1e1e1e;
            border:1px solid #333;
            padding:20px;
            border-radius:8px;
            height:600px;
            overflow-y:auto;
            white-space:pre;
            font-family:Consolas,"Courier New",monospace;
            font-size:14px;
            line-height:1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>影视聚合资源 JSON</h1>
        <div class="tip">加载中...</div>
        <button class="btn-copy" id="copyBtn">复制全部JSON内容</button>
        <div class="json-box" id="jsonContent"></div>
    </div>

<script>
const jsonFile = "影视聚合资源.json";
const contentEl = document.getElementById("jsonContent");
const tipEl = document.querySelector(".tip");
const copyBtn = document.getElementById("copyBtn");

// 加载并格式化JSON
async function loadJson(){
    tipEl.innerText = "正在加载：" + jsonFile;
    contentEl.innerText = "加载中...";
    try{
        let res = await fetch(jsonFile);
        if(!res.ok) throw "文件不存在或路径错误";
        let raw = await res.text();
        // 格式化缩进
        let formatJson = JSON.stringify(JSON.parse(raw), null, 2);
        contentEl.innerText = formatJson;
        tipEl.innerText = "加载成功：" + jsonFile;
    }catch(err){
        contentEl.innerText = "❌ 加载失败：" + err;
        tipEl.innerText = "加载异常";
    }
}

// 复制功能
copyBtn.onclick = async ()=>{
    try{
        await navigator.clipboard.writeText(contentEl.innerText);
        copyBtn.innerText = "✅ 已复制";
        setTimeout(()=>copyBtn.innerText="复制全部JSON内容",1500);
    }catch(e){
        alert("复制失败，请手动全选复制");
    }
};

// 页面初始化加载
loadJson();
</script>
</body>
</html>
